name: Deploy to Azure

# Manual/production deployment workflow, intended to run after CI passes on
# `main`. Uses GitHub OIDC to authenticate to Azure (no stored client secret).
#
# Required repository/environment secrets:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID  - federated OIDC app registration
#   AZURE_RESOURCE_GROUP                                     - target resource group
#   DB_ADMIN_PASSWORD                                        - PostgreSQL admin password
#   JWT_SECRET                                               - JWT signing secret for API auth
#   AUTH_PASSWORD_HASH                                       - bcrypt hash for API admin password
#
# The Static Web App deployment token is retrieved automatically from the
# Bicep-managed SWA using the OIDC credentials above, so no separate
# AZURE_STATIC_WEB_APPS_API_TOKEN secret is needed.
#
# See docs/architecture.md for the full setup guide.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  WORKER_IMAGE: ghcr.io/${{ github.repository }}:latest

jobs:
  build-and-push-worker-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/worker/Dockerfile
          push: true
          tags: ${{ env.WORKER_IMAGE }}

  deploy-infra:
    runs-on: ubuntu-latest
    needs: build-and-push-worker-image
    outputs:
      api-app-name: ${{ steps.deploy_bicep.outputs.apiAppName }}
      api-app-hostname: ${{ steps.deploy_bicep.outputs.apiAppHostName }}
      static-web-app-name: ${{ steps.deploy_bicep.outputs.staticWebAppName }}
      static-web-app-hostname: ${{ steps.deploy_bicep.outputs.staticWebAppHostName }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep template
        id: deploy_bicep
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template: infra/bicep/main.bicep
          parameters: >
            dbAdminPassword=${{ secrets.DB_ADMIN_PASSWORD }}
            workerContainerImage=${{ env.WORKER_IMAGE }}
            jwtSecret=${{ secrets.JWT_SECRET }}
            authPasswordHash=${{ secrets.AUTH_PASSWORD_HASH }}

  deploy-api:
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install & build API
        run: |
          npm install --workspaces --include-workspace-root
          npm run build --workspace=packages/shared
          npm run build --workspace=packages/db
          npm run build --workspace=packages/api

      - name: Assemble self-contained API deployment package
        run: |
          # npm workspaces hoists all dependencies (express, cors, and the
          # internal @i2v/db / @i2v/shared packages) into the repo root
          # node_modules as symlinks. packages/api on its own has no
          # node_modules, so deploying that folder as-is causes the app to
          # crash on boot with "Cannot find module 'express'". Assemble a
          # self-contained package with node_modules (symlinks dereferenced
          # so the built @i2v/db / @i2v/shared dist output is included).
          rm -rf /tmp/api-deploy
          mkdir -p /tmp/api-deploy
          cp -r packages/api/dist /tmp/api-deploy/dist
          cp packages/api/package.json /tmp/api-deploy/package.json
          cp -rL node_modules /tmp/api-deploy/node_modules

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy API to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ needs.deploy-infra.outputs.api-app-name }}
          package: /tmp/api-deploy

      - name: Update CORS_ORIGIN app setting
        run: |
          az webapp config appsettings set \
            --name ${{ needs.deploy-infra.outputs.api-app-name }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --settings CORS_ORIGIN=https://${{ needs.deploy-infra.outputs.static-web-app-hostname }}

  deploy-web:
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install & build web
        run: |
          npm install --workspaces --include-workspace-root
          npm run build --workspace=packages/web
        env:
          VITE_API_BASE_URL: https://${{ needs.deploy-infra.outputs.api-app-hostname }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Static Web App deployment token
        id: get_swa_token
        run: |
          SWA_TOKEN=$(az staticwebapp secrets list \
            --name ${{ needs.deploy-infra.outputs.static-web-app-name }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "properties.apiKey" \
            --output tsv)
          echo "::add-mask::$SWA_TOKEN"
          echo "token=$SWA_TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.get_swa_token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: packages/web/dist
          skip_app_build: true
